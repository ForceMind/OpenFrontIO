      <li>在 OpenFront 页面点击该书签，会弹出常驻面板（可关闭，可再次点击书签重开）。</li>
      <li>在面板输入金币并点击 <code>保存并应用</code>。</li>
      <li>该稳定版通过拦截开局配置生效：请在设置后新开一局（当前已开局不会立刻改）。</li>
    </ol>
